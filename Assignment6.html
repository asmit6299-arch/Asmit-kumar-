<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
</head>
<body text="yellow">
    
    
    <form>

        <table bgcolor="#373f4a">
            <tr bgcolor="orange">
                 <th colspan=2 align="left">Sign Up</th>
    
            </tr>

            <tr>
                <td>First Name</td>
                <td>
                    <input type="text" placeholder="Enter First Name">
                </td>
            </tr>

            <tr>
                <td>Last Name</td>
                <td>
                    <input type="text" placeholder="Enter Last Name">
                </td>
            </tr>

            <tr>
                <td>Date of Birth</td>
                <td>
                    <input type="date">
                </td>
            </tr>

            <tr>
                <td>Gender</td>
                <td>
                    <input type="radio" name="gender"> Male
                    <input type="radio" name="gender"> Female
                </td>
            </tr>

            <tr>
                <td>Country</td>
                <td>
                    <select>
                        <option>Country</option>
                        <option>India</option>
                        <option>Nepal</option>
                        <option>Bhopal</option>
                        <option>Bangladesh</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td>E-mail</td>
                <td>
                    <input type="email" placeholder="Enter E-mail">
                </td>
            </tr>

            <tr>
                <td>Phone</td>
                <td>
                    <input type="number" placeholder="Enter Phone">
                </td>
            </tr>

            <tr>
                <td>Password</td>
                <td>
                    <input type="password">
                </td>
            </tr>

            <tr>
                <td>Confirm Password</td>
                <td>
                    <input type="password">
                </td>
            </tr>

            <tr>
                <td colspan="2" align="right">
                    <input type="checkbox">
                    I Agree to the Terms of use
               
                </td>
                <tr>
                    <td align="right"colspan="2" bgcolor="orange">
                        <input type="submit" value="Submit">
                    <input type="reset" value="Cancel">
                
                    </td>
                </tr>
                
            </tr>

            <tr>
                
                    
            </tr>

        </table>

    </form>
   

</body>
</html>
